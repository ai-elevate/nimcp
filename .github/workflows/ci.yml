#==============================================================================
# NIMCP 2.5 CI/CD Pipeline
#==============================================================================
# Continuous Integration and Deployment
# Triggers: Push to main/master, Pull Requests
#==============================================================================

name: NIMCP CI/CD

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  BUILD_TYPE: Release
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  #----------------------------------------------------------------------------
  # Job 1: Build and Test
  #----------------------------------------------------------------------------
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-20.04]
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython${{ matrix.python-version }}-dev \
          pkg-config

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Run Tests
      run: |
        cd build
        ./src/tests/nimcp_tests --gtest_output=xml:test-results.xml

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: build/test-results.xml

    - name: Run Example Programs
      run: |
        cd build
        echo "Testing brain_demo..."
        timeout 10 ./examples/brain_demo || true
        echo "Testing ethics_demo..."
        timeout 10 ./examples/ethics_demo || true

  #----------------------------------------------------------------------------
  # Job 2: Code Quality Checks
  #----------------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run clang-format check
      run: |
        sudo apt-get install -y clang-format
        find src/ examples/ -name "*.c" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror

    - name: Check for TODO/FIXME
      run: |
        if grep -r "FIXME\|XXX" src/ examples/; then
          echo "Found FIXME/XXX comments - please address before merge"
          exit 1
        fi

    - name: Check file sizes
      run: |
        find src/lib -name "*.c" -exec wc -l {} + | \
          awk '$1 > 2000 {print "File too large: "$2" ("$1" lines)"; exit 1}'

  #----------------------------------------------------------------------------
  # Job 3: Build Docker Image
  #----------------------------------------------------------------------------
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-22.04
    needs: [build-and-test]

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  #----------------------------------------------------------------------------
  # Job 4: Performance Benchmarks
  #----------------------------------------------------------------------------
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-22.04
    needs: [build-and-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake python3-dev

    - name: Build with profiling
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Run benchmarks
      run: |
        cd build
        python3 ../monitoring/benchmarks/run_benchmarks.py > benchmark-results.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: build/benchmark-results.txt

  #----------------------------------------------------------------------------
  # Job 5: Security Scan
  #----------------------------------------------------------------------------
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  #----------------------------------------------------------------------------
  # Job 6: Generate Documentation
  #----------------------------------------------------------------------------
  documentation:
    name: Generate API Documentation
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Doxygen
      run: sudo apt-get install -y doxygen graphviz

    - name: Generate documentation
      run: |
        doxygen docs/Doxyfile

    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: api-documentation
        path: docs/html/

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/html

  #----------------------------------------------------------------------------
  # Job 7: Release (on tags)
  #----------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: [build-and-test, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        draft: false
        prerelease: false
