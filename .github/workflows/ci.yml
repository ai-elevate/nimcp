#==============================================================================
# NIMCP 2.5 CI/CD Pipeline
#==============================================================================
# Continuous Integration and Deployment
# Triggers: Push to main/master, Pull Requests
#==============================================================================

name: NIMCP CI/CD

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  BUILD_TYPE: Release
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  #----------------------------------------------------------------------------
  # Job 1: Build and Test
  #----------------------------------------------------------------------------
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-20.04]
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython${{ matrix.python-version }}-dev \
          pkg-config

    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Run Tests
      run: |
        cd build
        ./src/tests/nimcp_tests --gtest_output=xml:test-results.xml

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: build/test-results.xml

    - name: Run Example Programs
      run: |
        cd build
        echo "Testing brain_demo..."
        timeout 10 ./examples/brain_demo || true
        echo "Testing ethics_demo..."
        timeout 10 ./examples/ethics_demo || true

  #----------------------------------------------------------------------------
  # Job 2: Code Quality Checks
  #----------------------------------------------------------------------------
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install linting tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-format \
          clang-tidy \
          cppcheck \
          shellcheck \
          python3-pip
        pip3 install lizard

    - name: Run lint script
      run: |
        chmod +x scripts/lint.sh
        ./scripts/lint.sh --verbose

    - name: Run clang-format check
      run: |
        find src/ examples/ -name "*.c" -o -name "*.cpp" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,style,performance,portability \
                 --suppress=missingIncludeSystem \
                 --error-exitcode=1 \
                 -Isrc/include \
                 src/lib/ examples/

    - name: Check for FIXME/XXX
      run: |
        if grep -r "FIXME\|XXX" src/ examples/; then
          echo "Found FIXME/XXX comments - please address before merge"
          exit 1
        fi

    - name: Check file sizes
      run: |
        find src/lib -name "*.c" -exec wc -l {} + | \
          awk '$1 > 2000 {print "File too large: "$2" ("$1" lines)"; exit 1}'

    - name: Lint shell scripts
      run: |
        find scripts/ -name "*.sh" -exec shellcheck {} +

  #----------------------------------------------------------------------------
  # Job 2.5: Code Coverage
  #----------------------------------------------------------------------------
  code-coverage:
    name: Code Coverage
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython3.10-dev \
          pkg-config \
          lcov \
          gcov

    - name: Configure CMake with coverage
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_FLAGS="--coverage" \
          -DCMAKE_CXX_FLAGS="--coverage"

    - name: Build with coverage
      run: |
        cd build
        make -j$(nproc)

    - name: Run tests
      run: |
        cd build
        ./src/tests/nimcp_tests || true

    - name: Generate coverage report
      run: |
        chmod +x scripts/coverage.sh
        ./scripts/coverage.sh --html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/coverage.info
        fail_ci_if_error: false
        verbose: true

    - name: Upload coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage/html/

    - name: Check coverage threshold
      run: |
        if [ -f coverage/coverage.info ]; then
          COVERAGE=$(lcov --summary coverage/coverage.info 2>&1 | grep lines | awk '{print $2}' | sed 's/%//')
          echo "Line coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::warning::Coverage ($COVERAGE%) is below 70% threshold"
          fi
        fi

  #----------------------------------------------------------------------------
  # Job 2.6: Memory Leak Testing (Valgrind)
  #----------------------------------------------------------------------------
  memory-leak-tests:
    name: Memory Leak Testing (Valgrind)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython3.10-dev \
          pkg-config \
          valgrind

    - name: Configure and Build
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug
        make -j$(nproc)

    - name: Run memory leak tests
      run: |
        cd build
        ./src/tests/nimcp_tests --gtest_filter=MemoryLeakTest.*

    - name: Run critical tests under valgrind
      run: |
        cd build
        valgrind --leak-check=full \
                 --show-leak-kinds=definite \
                 --error-exitcode=99 \
                 --suppressions=../valgrind.supp \
                 ./src/tests/nimcp_tests \
                 --gtest_filter=NeuralNetCreate.BasicCreation:QueueUtils.CreateDestroy \
                 || echo "::warning::Valgrind detected potential issues"

    - name: Generate valgrind report
      if: always()
      run: |
        cd build
        valgrind --leak-check=full \
                 --show-leak-kinds=all \
                 --track-origins=yes \
                 --log-file=../valgrind-report.txt \
                 ./src/tests/nimcp_tests \
                 --gtest_filter=NeuralNetCreate.*:QueueUtils.* \
                 || true

    - name: Upload valgrind report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: valgrind-report
        path: valgrind-report.txt

  #----------------------------------------------------------------------------
  # Job 2.7: ThreadSanitizer (Race Condition Detection)
  #----------------------------------------------------------------------------
  thread-sanitizer:
    name: ThreadSanitizer (Race Detection)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython3.10-dev \
          pkg-config

    - name: Configure CMake with ThreadSanitizer
      run: |
        mkdir -p build-tsan
        cd build-tsan
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_TSAN=ON \
          -DENABLE_ASAN=OFF \
          -DENABLE_UBSAN=OFF

    - name: Build with TSAN
      run: |
        cd build-tsan
        make -j$(nproc)

    - name: Run thread safety tests
      run: |
        cd build-tsan
        export TSAN_OPTIONS="halt_on_error=1 history_size=7 second_deadlock_stack=1"
        ./src/tests/nimcp_tests \
          --gtest_filter="ThreadSafety*:Thread*:Concurrent*:*Stress*" \
          --gtest_output=xml:tsan-results.xml

    - name: Upload TSAN results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: tsan-results
        path: build-tsan/tsan-results.xml

  #----------------------------------------------------------------------------
  # Job 2.8: AddressSanitizer + UBSanitizer (Memory & UB Detection)
  #----------------------------------------------------------------------------
  address-sanitizer:
    name: AddressSanitizer + UBSanitizer
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython3.10-dev \
          pkg-config

    - name: Configure CMake with ASAN + UBSAN
      run: |
        mkdir -p build-asan
        cd build-asan
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_ASAN=ON \
          -DENABLE_UBSAN=ON \
          -DENABLE_TSAN=OFF

    - name: Build with ASAN + UBSAN
      run: |
        cd build-asan
        make -j$(nproc)

    - name: Run sanitizer tests
      run: |
        cd build-asan
        export ASAN_OPTIONS="detect_leaks=1:check_initialization_order=1:strict_init_order=1:halt_on_error=0"
        export UBSAN_OPTIONS="print_stacktrace=1:halt_on_error=0"
        ./src/tests/nimcp_tests \
          --gtest_output=xml:asan-results.xml || true

    - name: Check for sanitizer errors
      run: |
        cd build-asan
        if grep -q "SUMMARY.*Sanitizer" asan-results.xml 2>/dev/null; then
          echo "::error::Sanitizer detected issues"
          exit 1
        fi

    - name: Upload ASAN results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: asan-results
        path: build-asan/asan-results.xml

  #----------------------------------------------------------------------------
  # Job 2.9: Comprehensive Static Analysis (Phase 3)
  #----------------------------------------------------------------------------
  static-analysis:
    name: Comprehensive Static Analysis
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install analysis tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          cppcheck \
          clang-tools \
          iwyu \
          build-essential \
          cmake \
          python3-dev

    - name: Configure CMake for analysis
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run comprehensive static analysis
      run: |
        chmod +x scripts/static-analysis.sh
        ./scripts/static-analysis.sh --report || echo "::warning::Static analysis found issues"

    - name: Upload analysis reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: static-analysis-reports
        path: security-reports/

  #----------------------------------------------------------------------------
  # Job 2.10: Coverage Enforcement (Phase 3)
  #----------------------------------------------------------------------------
  coverage-enforcement:
    name: Coverage Enforcement (85%)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython3.10-dev \
          lcov \
          gcov \
          bc

    - name: Configure with coverage
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
          -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage"

    - name: Build and test
      run: |
        cd build
        make -j$(nproc)

    - name: Enforce coverage threshold
      run: |
        chmod +x scripts/coverage.sh
        ./scripts/coverage.sh --enforce --threshold 85 || echo "::warning::Coverage below 85% threshold"

    - name: Upload coverage HTML report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-enforcement-report
        path: coverage/html/

  #----------------------------------------------------------------------------
  # Job 2.11: Dependency Security Scan (Phase 3)
  #----------------------------------------------------------------------------
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python scanning tools
      run: |
        pip3 install safety pip-licenses

    - name: Run dependency scanner
      run: |
        chmod +x scripts/dependency-scan.sh
        ./scripts/dependency-scan.sh --report || echo "::warning::Dependency scan found issues"

    - name: Upload dependency reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: dependency-scan-reports
        path: security-reports/

  #----------------------------------------------------------------------------
  # Job 2.12: Stress Testing (Phase 3)
  #----------------------------------------------------------------------------
  stress-tests:
    name: Stress & Performance Tests
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          python3-dev \
          libpython3.10-dev

    - name: Configure and Build
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Run stress tests
      run: |
        cd build
        ./src/tests/nimcp_tests \
          --gtest_filter="Stress*" \
          --gtest_output=xml:stress-results.xml || echo "::warning::Some stress tests failed"

    - name: Upload stress test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: stress-test-results
        path: build/stress-results.xml

  #----------------------------------------------------------------------------
  # Job 3: Build Docker Image
  #----------------------------------------------------------------------------
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-22.04
    needs: [build-and-test]

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  #----------------------------------------------------------------------------
  # Job 4: Performance Benchmarks
  #----------------------------------------------------------------------------
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-22.04
    needs: [build-and-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake python3-dev

    - name: Build with profiling
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Run benchmarks
      run: |
        cd build
        python3 ../monitoring/benchmarks/run_benchmarks.py > benchmark-results.txt

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: build/benchmark-results.txt

  #----------------------------------------------------------------------------
  # Job 5: Security Scan
  #----------------------------------------------------------------------------
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  #----------------------------------------------------------------------------
  # Job 6: Generate Documentation
  #----------------------------------------------------------------------------
  documentation:
    name: Generate API Documentation
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Doxygen
      run: sudo apt-get install -y doxygen graphviz

    - name: Generate documentation
      run: |
        doxygen docs/Doxyfile

    - name: Upload documentation
      uses: actions/upload-artifact@v3
      with:
        name: api-documentation
        path: docs/html/

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/html

  #----------------------------------------------------------------------------
  # Job 7: Release (on tags)
  #----------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: [build-and-test, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        generate_release_notes: true
        draft: false
        prerelease: false
