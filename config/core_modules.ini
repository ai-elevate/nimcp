# NIMCP Core Modules Configuration
# Auto-generated configuration template for refactored core modules
# Version: 2.0.0
# Date: 2025-11-28

#==============================================================================
# AXON MODULE CONFIGURATION
#==============================================================================

[axon]
# Conduction velocity coefficients
velocity_coeff_unmyelinated = 1.0        # m/s per sqrt(um)
velocity_coeff_myelinated = 6.0          # m/s per um diameter
min_velocity = 0.1                       # Minimum velocity (m/s)

# Activity and plasticity
activity_decay_factor = 0.99             # Decay factor per ms (0-1)
refractory_period_ms = 1.0               # Absolute refractory period (ms)

# Metabolic parameters
atp_consumption_per_spike = 0.01         # ATP consumed per spike (0-1)
atp_regeneration_rate = 0.001            # ATP regeneration per ms
initial_atp_level = 1.0                  # Starting ATP level (0-1)
min_atp_for_spike = 0.1                  # Minimum ATP to fire (0-1)

# Morphological defaults
default_g_ratio = 0.77                   # Optimal g-ratio
default_diameter_um = 1.0                # Default axon diameter (um)
default_length_um = 100.0                # Default axon length (um)

# Performance and memory
use_segment_pool = false                 # Enable segment memory pooling
segment_pool_size = 4096                 # Pool size if enabled

# Timeouts
creation_timeout_ms = 5000               # Axon creation timeout (ms)
operation_timeout_ms = 1000              # General operation timeout (ms)

#==============================================================================
# DENDRITE MODULE CONFIGURATION
#==============================================================================

[dendrite]
# Morphological defaults
default_diameter_um = 2.0                # Default diameter (um)
default_length_um = 100.0                # Default length (um)

# Cable theory parameters
membrane_resistance = 20000.0            # Ω·cm² (membrane resistance)
membrane_capacitance = 1.0               # μF/cm² (membrane capacitance)
axial_resistance = 150.0                 # Ω·cm (axial resistance)

# Spine parameters
spine_density_per_um = 2.0               # Spines per micrometer
spine_neck_resistance = 500.0            # MΩ (neck resistance)
spine_head_capacitance = 0.01            # pF (head capacitance)

# Calcium dynamics
calcium_decay_tau_ms = 20.0              # Calcium decay time constant (ms)
calcium_buffer_capacity = 100.0          # Buffering capacity
calcium_resting_level = 0.1              # Resting [Ca2+] (μM)

# Plasticity thresholds
ltp_threshold = 0.8                      # LTP calcium threshold (μM)
ltd_threshold = 0.3                      # LTD calcium threshold (μM)
structural_plasticity_rate = 0.001       # Per timestep

# Integration
integration_window_ms = 20.0             # Temporal integration window (ms)
attenuation_factor = 0.5                 # Voltage attenuation (0-1)

# Performance
creation_timeout_ms = 5000               # Creation timeout (ms)

#==============================================================================
# NEURON MODELS MODULE CONFIGURATION
#==============================================================================

[neuron_models]
# Izhikevich model defaults
izhikevich_a = 0.02                      # Recovery time scale
izhikevich_b = 0.2                       # Sensitivity to u
izhikevich_c = -65.0                     # Reset voltage (mV)
izhikevich_d = 8.0                       # Reset recovery variable

# Two-compartment model defaults
soma_capacitance = 1.0                   # nF
dendrite_capacitance = 0.5               # nF
coupling_conductance = 0.1               # μS

# Integration
default_timestep_ms = 0.1                # Default dt (ms)
integration_method = 2                   # 0=Euler, 1=RK2, 2=RK4

# Performance
creation_timeout_ms = 3000               # Creation timeout (ms)

#==============================================================================
# SYNAPSE TYPES MODULE CONFIGURATION
#==============================================================================

[synapse_types]
# AMPA receptor defaults
ampa_tau_rise_ms = 0.5                   # Rise time constant (ms)
ampa_tau_decay_ms = 2.0                  # Decay time constant (ms)
ampa_reversal_mv = 0.0                   # Reversal potential (mV)
ampa_max_conductance = 1.0               # Maximum conductance (nS)

# NMDA receptor defaults
nmda_tau_rise_ms = 2.0                   # Rise time constant (ms)
nmda_tau_decay_ms = 100.0                # Decay time constant (ms)
nmda_reversal_mv = 0.0                   # Reversal potential (mV)
nmda_max_conductance = 0.5               # Maximum conductance (nS)
nmda_mg_block = 0.062                    # Mg2+ block constant (1/mV)
nmda_mg_concentration = 1.0              # [Mg2+] (mM)

# GABA_A receptor defaults
gaba_a_tau_rise_ms = 0.5                 # Rise time constant (ms)
gaba_a_tau_decay_ms = 6.0                # Decay time constant (ms)
gaba_a_reversal_mv = -70.0               # Reversal potential (mV)
gaba_a_max_conductance = 1.0             # Maximum conductance (nS)

# Plasticity
enable_stdp = true                       # Enable STDP
stdp_window_ms = 20.0                    # STDP window (ms)
stdp_a_plus = 0.01                       # LTP amplitude
stdp_a_minus = 0.012                     # LTD amplitude
stdp_tau_plus_ms = 20.0                  # LTP time constant (ms)
stdp_tau_minus_ms = 20.0                 # LTD time constant (ms)

# Performance
creation_timeout_ms = 3000               # Creation timeout (ms)

#==============================================================================
# BRAIN MODULE CONFIGURATION
#==============================================================================

[brain]
# Network size defaults
default_num_neurons = 1000               # Default neuron count
max_num_neurons = 1000000                # Maximum neurons
default_connectivity = 0.1               # Connection probability (0-1)

# Timing
default_timestep_ms = 1.0                # Default simulation timestep (ms)
max_timestep_ms = 10.0                   # Maximum allowed timestep (ms)

# Plasticity
enable_plasticity = true                 # Enable global plasticity
plasticity_update_interval_ms = 10.0     # Update interval (ms)

# Memory management
enable_cow = true                        # Enable copy-on-write
enable_memory_pool = true                # Enable memory pooling
pool_size = 8192                         # Memory pool size

# Performance
creation_timeout_ms = 10000              # Brain creation timeout (ms)
simulation_timeout_ms = 1000             # Simulation step timeout (ms)

#==============================================================================
# BRAIN FACTORY MODULE CONFIGURATION
#==============================================================================

[brain_factory]
# Validation parameters
validate_on_create = true                # Validate brain structure
check_connectivity = true                # Check connection integrity
check_memory_limits = true               # Check memory constraints

# Performance
validation_timeout_ms = 5000             # Validation timeout (ms)
creation_timeout_ms = 15000              # Total creation timeout (ms)

#==============================================================================
# BRAIN PERSISTENCE MODULE CONFIGURATION
#==============================================================================

[brain_persistence]
# File format
default_format = "binary"                # binary, json, hdf5
compression_enabled = true               # Enable compression
compression_level = 6                    # Compression level (1-9)

# Checkpointing
enable_checkpoints = true                # Enable automatic checkpointing
checkpoint_interval_ms = 60000           # Checkpoint every 60 seconds
max_checkpoints = 5                      # Keep last N checkpoints

# Performance
save_timeout_ms = 30000                  # Save operation timeout (ms)
load_timeout_ms = 30000                  # Load operation timeout (ms)

# Paths
checkpoint_directory = "/tmp/nimcp/checkpoints"
backup_directory = "/tmp/nimcp/backups"

#==============================================================================
# NEURALNET MODULE CONFIGURATION
#==============================================================================

[neuralnet]
# Network defaults
default_num_layers = 3                   # Default layer count
default_layer_size = 100                 # Default neurons per layer

# Learning
default_learning_rate = 0.001            # Default learning rate
learning_rate_decay = 0.95               # LR decay per epoch
min_learning_rate = 0.00001              # Minimum LR

# Training
default_batch_size = 32                  # Default batch size
default_num_epochs = 100                 # Default training epochs
early_stopping_patience = 10             # Epochs without improvement

# Performance
creation_timeout_ms = 10000              # Network creation timeout (ms)

