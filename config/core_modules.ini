theta_max_hz = 8.0                       # Theta max frequency
alpha_min_hz = 8.0                       # Alpha min frequency
alpha_max_hz = 13.0                      # Alpha max frequency
beta_min_hz = 13.0                       # Beta min frequency
beta_max_hz = 30.0                       # Beta max frequency
gamma_min_hz = 30.0                      # Gamma min frequency
gamma_max_hz = 100.0                     # Gamma max frequency

# Analysis
