inter_column_connectivity = 0.05         # Between-column connections

# Performance
creation_timeout_ms = 15000              # Column creation timeout (ms)

#==============================================================================
# BRAIN OSCILLATIONS MODULE CONFIGURATION
#==============================================================================

[brain_oscillations]
# Oscillation bands (Hz)
delta_min_hz = 1.0                       # Delta min frequency
delta_max_hz = 4.0                       # Delta max frequency
