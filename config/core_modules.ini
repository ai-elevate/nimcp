analysis_interval_ms = 100.0             # Analysis interval (ms)

#==============================================================================
# BRAIN REGIONS MODULE CONFIGURATION
#==============================================================================

[brain_regions]
# Region sizes (approximate neuron counts)
cortex_size = 100000                     # Cortex neurons
hippocampus_size = 10000                 # Hippocampus neurons
amygdala_size = 5000                     # Amygdala neurons
thalamus_size = 5000                     # Thalamus neurons
basal_ganglia_size = 5000                # Basal ganglia neurons

# Inter-region connectivity
cortex_hippocampus_connectivity = 0.01   # Cortex-hippocampus connections
cortex_thalamus_connectivity = 0.02      # Cortex-thalamus connections
amygdala_hippocampus_connectivity = 0.01 # Amygdala-hippocampus connections

#==============================================================================
# TOPOLOGY MODULE CONFIGURATION
#==============================================================================

[topology]
# Network topology defaults
default_topology = "small_world"         # small_world, scale_free, random
small_world_k = 6                        # K neighbors for small-world
small_world_p = 0.1                      # Rewiring probability
scale_free_m = 3                         # Edges per new node (scale-free)

# Community detection
community_resolution = 1.0               # Modularity resolution
min_community_size = 10                  # Minimum community size

# Fractal parameters
fractal_dimension = 2.5                  # Target fractal dimension
fractal_iterations = 5                   # Fractal generation iterations

#==============================================================================
# INTEGRATION MODULE CONFIGURATION
#==============================================================================

[integration]
# Multimodal integration
enable_cross_modal = true                # Enable cross-modal integration
integration_window_ms = 50.0             # Temporal integration window (ms)
spatial_integration_radius_um = 500.0    # Spatial integration radius (um)

# Binding
binding_threshold = 0.7                  # Binding probability threshold
binding_decay_tau_ms = 100.0             # Binding decay time constant (ms)

#==============================================================================
# SYNAPSE COMPUTE MODULE CONFIGURATION
#==============================================================================

[synapse_compute]
# Computation parameters
use_gpu = false                          # Enable GPU acceleration
gpu_device_id = 0                        # GPU device to use
batch_size = 256                         # Computation batch size

# Numerical precision
use_double_precision = false             # Use double precision (slower)
numerical_tolerance = 1e-6               # Numerical tolerance

#==============================================================================
# GLOBAL CONFIGURATION
#==============================================================================

[global]
# Logging
log_level = "info"                       # trace, debug, info, warn, error, fatal
log_to_console = true                    # Log to console
log_to_file = true                       # Log to file
log_file_path = "/var/log/nimcp/core.log"
log_rotation_size_mb = 10                # Rotate at size (MB)
log_max_rotated_files = 5                # Keep N rotated files

# Threading
num_worker_threads = 4                   # Worker thread pool size
enable_thread_affinity = false           # Pin threads to cores

# Memory
enable_memory_tracking = true            # Track memory allocations
memory_limit_mb = 4096                   # Maximum memory usage (MB)
enable_memory_guards = true              # Enable buffer overflow detection

# Security
enable_security_checks = true            # Enable security validation
log_security_events = true               # Log security events

# Performance profiling
enable_profiling = false                 # Enable performance profiling
profiling_interval_ms = 1000             # Profiling sample interval (ms)

#==============================================================================
# END OF CONFIGURATION
#==============================================================================
