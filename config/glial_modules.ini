#===============================================================================
# NIMCP Glial Module Configuration
#
# This configuration file defines hyperparameters for all glial cell modules.
# Changes to this file can be hot-reloaded by sending SIGHUP to the process.
#
# Author: NIMCP Development Team
# Date: 2025-11-28
# Version: 1.0
#===============================================================================

#===============================================================================
# ASTROCYTES - Star-shaped glial cells for synaptic modulation
#===============================================================================
[astrocytes]

# Maximum number of synapses one astrocyte can cover
# Biological range: 20,000-100,000 in mammalian cortex
# Simulation range: 100-10,000 (depending on scale)
max_synapses = 1000

# Maximum number of gap junction coupled neighbors
# Biological: 2-8 nearest neighbors
max_coupled = 6

# Baseline calcium concentration (µM)
# Biological: 0.05-0.15 µM at rest
baseline_calcium_um = 0.1

# Calcium threshold for wave propagation (µM)
# Biological: 1.5-3.0 µM triggers IP3-mediated waves
wave_threshold_um = 2.0

# Gap junction coupling radius (µm)
# Biological: astrocytes couple within 50-150 µm
coupling_radius_um = 100.0

# Calcium diffusion coefficient (µm²/s)
# Biological: 50-200 µm²/s in cytoplasm
# Tuned for computational wave propagation
calcium_diffusion_coeff = 100.0

# IP3 diffusion coefficient (µm²/s)
# Biological: IP3 diffuses faster than Ca²⁺ (100-300 µm²/s)
ip3_diffusion_coeff = 200.0

# Calcium wave propagation speed target (µm/s)
# Biological: 10-30 µm/s in vivo
# Computational: 100-2000 µm/s for faster simulation
wave_speed_target = 500.0

# IP3 production rate constant
# Stimulus-driven IP3 synthesis rate
ip3_production_rate = 1.0

# IP3 degradation rate constant (1/s)
# Fast decay ensures transient signals
# Biological half-life: ~0.5-2 seconds
ip3_degradation_rate = 3.0

# Calcium release flux coefficient
# Scales ER calcium release in response to IP3
# Tuned for strong wave propagation
calcium_release_flux = 0.5

# Calcium uptake/pump rate constant (1/s)
# SERCA pump rate for returning to baseline
# Biological: decay time constant 1-5 seconds
calcium_uptake_rate = 3.0

# Coverage radius (µm)
# Spatial coverage for synapse detection
coverage_radius = 50.0

# Glutamate pool refill rate (1/s)
# How quickly glutamate vesicles are replenished
glutamate_refill_rate = 0.5

# D-serine pool refill rate (1/s)
# How quickly D-serine is synthesized
d_serine_refill_rate = 0.3

# ATP regeneration rate (1/s)
# Metabolic energy recovery
atp_regeneration_rate = 1.0

#===============================================================================
# MICROGLIA - Immune cells for surveillance and synaptic pruning
#===============================================================================
[microglia]

# Surveillance radius (µm)
# How far microglia processes extend to monitor tissue
# Biological: 30-80 µm in healthy brain
surveillance_radius_um = 50.0

# Process extension speed (µm/s)
# Speed of ramified process movement
# Biological: 1-3 µm/s
process_speed_um_s = 2.0

# Process retraction speed (µm/s)
# Speed when retracting processes
process_retraction_speed_um_s = 3.0

# Phagocytosis threshold
# Minimum "eat me" signal to trigger synaptic pruning
# Range: 0.0-1.0, lower = more aggressive pruning
phagocytosis_threshold = 0.5

# Cytokine release rate (µM/s)
# Rate of inflammatory cytokine production
# Biological: varies widely based on activation state
cytokine_release_rate = 0.1

# Chemotaxis sensitivity
# How strongly microglia respond to chemotactic gradients
# Higher values = stronger directed migration
chemotaxis_sensitivity = 1.0

# Activation threshold
# Minimum damage/pathology signal to activate
activation_threshold = 0.3

# Deactivation time constant (seconds)
# How long it takes to return to ramified state
deactivation_tau_s = 300.0

# Maximum synapses per microglia
# Surveillance capacity limit
max_monitored_synapses = 1000

# Synapse health check interval (ms)
# How often to reassess synapse health
health_check_interval_ms = 100.0

#===============================================================================
# OLIGODENDROCYTES - Myelin-producing cells for axon insulation
#===============================================================================
[oligodendrocytes]

# Maximum axons per oligodendrocyte
# Biological: 20-60 in CNS
max_axons = 40

# Myelin production rate (lamellae/s)
# How quickly myelin wraps are added
# Biological: develops over days-weeks in vivo
# Simulation: accelerated for computational feasibility
myelin_production_rate = 0.1

# Lactate production rate (µM/s)
# Metabolic support to axons via lactate shuttle
# Biological: critical for axon health
lactate_production_rate = 0.5

# Lactate transfer efficiency
# How efficiently lactate is transferred to axons
# Range: 0.0-1.0
lactate_transfer_efficiency = 0.8

# Territory radius (µm)
# Spatial extent of oligodendrocyte processes
# Biological: 100-200 µm reach
territory_radius_um = 150.0

# NRG1 sensitivity
# Sensitivity to neuregulin-1 signaling for myelination
# Higher values = more responsive to axon activity
nrg1_sensitivity = 1.0

# BDNF sensitivity
# Sensitivity to brain-derived neurotrophic factor
bdnf_sensitivity = 0.8

# Glucose uptake rate (µM/s)
# Metabolic glucose consumption
glucose_uptake_rate = 1.0

# ATP cost per myelin segment (ATP/s)
# Energetic cost of myelin maintenance
atp_cost_per_segment = 0.01

# Activity threshold for myelination (Hz)
# Minimum axon firing rate to trigger myelination
activity_threshold_hz = 1.0

# Maturation time (seconds)
# Time for OPC to differentiate into mature oligodendrocyte
# Biological: hours-days
# Simulation: accelerated
maturation_time_s = 100.0

#===============================================================================
# MYELIN SHEATH - Myelin structure and biophysics
#===============================================================================
[myelin_sheath]

# Optimal g-ratio target
# Inner axon diameter / outer fiber diameter
# Biological optimum: 0.77 for maximal conduction velocity
# Range: 0.6-0.9
target_g_ratio = 0.77

# G-ratio tolerance
# Acceptable deviation from optimal
# Used for efficiency calculations
g_ratio_tolerance = 0.1

# Minimum lamellae count
# Minimum myelin wraps for functional insulation
min_lamellae = 3

# Maximum lamellae count
# Maximum wraps before diminishing returns
# Biological: varies with axon diameter (5-100+)
max_lamellae = 50

# Optimal lamellae count
# Target for mature myelin
# Scales with axon diameter
optimal_lamellae = 30

# Lamella thickness (nm)
# Thickness of one myelin wrap
# Biological: ~12-15 nm
lamella_thickness_nm = 15.0

# Repair rate multiplier
# Scales remyelination speed after damage
# 1.0 = normal repair, >1.0 = accelerated repair
repair_rate_multiplier = 1.0

# Damage decay rate (1/s)
# Natural degradation rate of myelin
# Very slow in healthy conditions
damage_decay_rate = 0.0001

# Myelination threshold
# Minimum signal to initiate myelination
myelination_threshold = 0.5

# Internode length ratio
# Internode length = axon diameter * ratio
# Biological: ~100-150x diameter
internode_diameter_ratio = 100.0

# Minimum internode length (µm)
min_internode_um = 100.0

# Maximum internode length (µm)
max_internode_um = 1500.0

# Node of Ranvier length (µm)
# Unmyelinated gap between internodes
# Biological: 0.5-2.0 µm
node_length_um = 1.0

# Base conduction velocity (m/s)
# Unmyelinated axon baseline
# Biological: 0.5-2.0 m/s for unmyelinated
base_velocity_ms = 1.0

# Myelinated velocity coefficient
# Hursh's law: v ≈ 6 * diameter (m/s per µm)
# Biological: 4.5-6.0 m/s per µm
velocity_coeff = 6.0

# Maximum conduction velocity (m/s)
# Upper limit for myelinated fibers
# Biological: 80-120 m/s for largest fibers
max_velocity_ms = 100.0

# Myelin velocity multiplier
# How much myelination increases velocity
# Biological: 10-50x faster than unmyelinated
myelin_multiplier = 20.0

# ATP maintenance cost (ATP/s per segment)
# Energy cost of maintaining myelin
atp_maintenance = 0.001

# Trophic support threshold
# Minimum trophic factor level for health
trophic_threshold = 0.3

# Integrity thresholds
integrity_healthy = 0.9
integrity_damaged = 0.6
integrity_critical = 0.3

#===============================================================================
# GLIAL INTEGRATION - Cross-module interactions
#===============================================================================
[glial_integration]

# Enable astrocyte-neuron feedback
astrocyte_neuron_feedback = true

# Enable microglia-synapse interaction
microglia_synapse_interaction = true

# Enable oligodendrocyte-axon coupling
oligodendrocyte_axon_coupling = true

# Enable glial-glial communication
glial_glial_communication = true

# Astrocyte modulation strength
# How strongly astrocytes affect synaptic transmission
# Range: 0.0-1.0
astrocyte_modulation_strength = 0.3

# Microglia pruning strength
# How aggressively microglia prune synapses
# Range: 0.0-1.0, higher = more pruning
microglia_pruning_strength = 0.1

# Myelin feedback strength
# How strongly myelination affects axon properties
# Range: 0.0-1.0
myelin_feedback_strength = 0.5

# Integration update interval (ms)
# How often glial-neural coupling is updated
# Lower = more accurate but higher computational cost
integration_update_interval_ms = 1.0

# Enable spatial indexing
# Use KD-tree for fast spatial queries
# Recommended for >1000 glial cells
enable_spatial_indexing = true

# Spatial index rebuild interval (ms)
# How often to rebuild spatial index
# Higher = better performance but stale index
spatial_rebuild_interval_ms = 1000.0

#===============================================================================
# LOGGING AND DEBUGGING
#===============================================================================
[logging]

# Global log level for glial modules
# Levels: TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF
glial_log_level = INFO

# Per-module log levels (overrides global)
astrocytes_log_level = DEBUG
microglia_log_level = INFO
oligodendrocytes_log_level = INFO
myelin_sheath_log_level = WARN
glial_integration_log_level = INFO

# Enable performance profiling
enable_profiling = false

# Enable memory leak detection
enable_leak_detection = true

# Log file path
log_file = /tmp/nimcp_glial.log

# Max log file size (MB)
max_log_size_mb = 100

# Max rotated log files
max_log_files = 5

#===============================================================================
# PERFORMANCE TUNING
#===============================================================================
[performance]

# Enable memory pooling
# Use pre-allocated pools for hot-path allocations
enable_memory_pools = true

# Astrocyte pool size
# Number of pre-allocated astrocytes
astrocyte_pool_size = 1000

# Microglia pool size
microglia_pool_size = 100

# Oligodendrocyte pool size
oligodendrocyte_pool_size = 500

# Synapse coverage pool size
# Pre-allocated synapse coverage entries
synapse_coverage_pool_size = 100000

# Enable SIMD optimizations
# Use vectorized instructions for bulk operations
enable_simd = true

# Thread pool size
# Number of worker threads for parallel operations
# 0 = auto-detect CPU count
thread_pool_size = 0

# Calcium update batch size
# Number of astrocytes to update in parallel
calcium_batch_size = 100

#===============================================================================
# EXPERIMENTAL FEATURES
#===============================================================================
[experimental]

# Enable GPU acceleration
# Offload reaction-diffusion to GPU
enable_gpu = false

# Enable distributed simulation
# Multi-node glial network simulation
enable_distributed = false

# Enable event replay
# Record and replay events for debugging
enable_event_replay = false

# Enable adaptive time stepping
# Automatically adjust dt based on dynamics
enable_adaptive_dt = false

# Enable stochastic dynamics
# Add biological noise to deterministic models
enable_stochastic = false

# Stochastic noise strength
# Standard deviation of Gaussian noise
stochastic_noise_strength = 0.01
