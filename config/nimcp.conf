#==============================================================================
# NIMCP 2.5 Configuration File
#==============================================================================
# Production configuration for NIMCP deployment
#==============================================================================

[core]
# Data directory for persistent storage
data_dir = /var/lib/nimcp

# Log directory
log_dir = /var/log/nimcp

# Log level: debug, info, warn, error
log_level = info

# Maximum number of concurrent workers
max_workers = 4

[brain]
# Default brain size for new instances
default_size = SMALL

# Enable automatic optimization
auto_optimize = true

# Pruning threshold for weak synapses
prune_threshold = 0.01

# Save interval (seconds, 0 = disabled)
autosave_interval = 300

[ethics]
# Golden Rule threshold
golden_rule_threshold = 0.5

# Empathy weight in decision making
empathy_weight = 0.7

# Maximum agents to simulate
max_agents = 10

# Enable learning from outcomes
enable_learning = true

[curiosity]
# Curiosity threshold for question generation
curiosity_threshold = 0.6

# Maximum questions per knowledge gap
max_questions = 5

# Enable automatic knowledge seeking
auto_seek = true

[knowledge]
# Maximum concepts in memory
max_concepts = 10000

# Concept pruning threshold
prune_threshold = 0.1

# Enable multi-domain integration
enable_integration = true

[network]
# P2P listen port (0 = disabled)
p2p_port = 0

# Maximum peers
max_peers = 10

# Enable distributed learning
enable_distributed = false

[monitoring]
# Enable metrics collection
enable_metrics = true

# Metrics port
metrics_port = 9090

# Enable health checks
enable_health_checks = true

# Health check interval (seconds)
health_check_interval = 30

[performance]
# Enable CPU affinity
enable_cpu_affinity = false

# Thread pool size (0 = auto)
thread_pool_size = 0

# Memory limit (MB, 0 = unlimited)
memory_limit = 4096

# Enable memory profiling
enable_memory_profiling = false
