# NIMCP Brain Configuration Template
# Use Case: Anomaly Detection for IoT Sensors / Industrial Monitoring
# Description: Pattern matching brain for detecting abnormal sensor readings
# Applications: Predictive maintenance, security monitoring, quality control
# Method: Learns normal patterns, flags deviations as anomalies

brain:
  # Identity
  name: "iot_anomaly_detector"

  # Brain size: tiny for edge deployment (IoT devices, microcontrollers)
  size: tiny  # 100 neurons, <1MB memory, ~0.1ms inference

  # Task type: pattern matching (normal vs abnormal)
  task: pattern_matching

  # Network Architecture
  architecture:
    num_inputs: 20           # 20 sensor features (temp, vibration, pressure, etc.)
    num_outputs: 2           # Binary: normal (0) or anomaly (1)
    num_hidden: 50           # Compact for edge devices
    learning_rate: 0.02      # Higher learning for rapid adaptation

  # Training Configuration
  training:
    max_epochs: 50           # Quick training for deployment
    batch_size: 16           # Small batches for limited memory
    validation_split: 0.10   # Small validation set
    early_stopping: true     # Quick convergence
    patience: 8              # Less patience for simple task

  # Synaptic Plasticity
  plasticity:
    enable_bcm: true         # Adaptive thresholds for drift
    bcm_tau: 500.0           # Fast adaptation to changing baselines
    enable_stdp: false       # Not needed for static patterns
    stdp_window: 20.0        # Unused

  # Ethics Configuration
  ethics:
    enabled: false           # Not applicable for sensor data
    golden_rule_threshold: 0.0
    empathy_weight: 0.5

  # Model Persistence
  model_path: "/tmp/models/anomaly_detector.brain"
  checkpoint_interval: 5    # Frequent saves for edge devices

# Sensor Input Features (Example for Industrial Motor):
# ------------------------------------------------------
# Features[0-19]:
#   [0] Motor temperature (°C)
#   [1] Vibration amplitude (mm/s)
#   [2] Vibration frequency (Hz)
#   [3] Current draw (A)
#   [4] Voltage (V)
#   [5] RPM (rotations per minute)
#   [6] Bearing temperature (°C)
#   [7] Oil pressure (PSI)
#   [8] Acoustic level (dB)
#   [9] Power consumption (W)
#   [10-14] FFT coefficients (frequency domain)
#   [15-19] Statistical features (mean, std, skew, kurtosis, etc.)

# Training Strategy:
# ------------------
# 1. Collect NORMAL operation data only (critical!)
# 2. Normalize all features to [0, 1] range
# 3. Train brain to recognize "normal" as class 0
# 4. Any deviation from learned patterns → anomaly (class 1)
# 5. Set confidence threshold (e.g., 0.85) for alerting

