# Deployment Considerations:
# --------------------------
# - Edge Device: Tiny brain fits on Raspberry Pi, ESP32, Arduino
# - Power: <1ms inference = battery-friendly
# - Network: Local processing, no cloud dependency
# - Latency: Real-time detection (<1ms)
# - Updates: Retrain periodically with new normal data

# Anomaly Types Detected:
# ------------------------
# - Point anomalies: Single unusual reading
# - Contextual anomalies: Unusual in specific context
# - Collective anomalies: Sequence of unusual patterns
# - Drift: Gradual degradation over time

# Alert Thresholds:
# -----------------
# confidence > 0.95 → Definitely normal (no alert)
# 0.85 < confidence < 0.95 → Warning (log, monitor)
# confidence < 0.85 → Alert (investigate immediately)
# confidence < 0.70 → Critical (shutdown, safety protocol)

# False Positive Reduction:
# -------------------------
# - Use voting: Require N consecutive anomalies before alerting
# - Temporal smoothing: Moving average of confidence scores
# - Multi-model: Combine with traditional methods (Isolation Forest, One-Class SVM)
# - Human-in-loop: Review and label false positives for retraining

# Maintenance:
# ------------
# - Retrain weekly/monthly with verified normal data
# - Monitor BCM adaptation to detect concept drift
# - Log all anomalies for post-analysis
# - Update thresholds based on false positive rate
