# NIMCP Multi-Task Learning Configuration
# Use Case: Single brain performing multiple related tasks simultaneously
# Architecture: Shared feature extraction + Task-specific output heads
# Benefits: Transfer learning, shared representations, efficiency

# NOTE: This is an ADVANCED configuration template
# Requires modifications to support multiple output heads
# See implementation notes at the bottom

brain:
  # Identity
  name: "multitask_brain"

  # Brain size: large for handling multiple tasks
  size: large  # 100K neurons, ~500MB memory, ~50ms inference

  # Primary task (for compatibility, will be extended)
  task: classification  # Extended to multi-task below

  # Shared Network Architecture
  architecture:
    # Shared feature extractor
    num_inputs: 512          # Common input representation

    # Multi-head outputs (PROPOSED EXTENSION)
    # Task 1: Classification (e.g., image category)
    num_outputs_task1: 10    # 10 classes

    # Task 2: Regression (e.g., image quality score)
    num_outputs_task2: 1     # Single continuous value

    # Task 3: Segmentation (e.g., object detection)
    num_outputs_task3: 100   # 100 bounding box coordinates

    # Shared hidden layers (feature extraction)
    num_hidden_shared: 1024  # Large shared representation

    # Task-specific hidden layers
    num_hidden_task1: 256    # Classification head
    num_hidden_task2: 128    # Regression head
    num_hidden_task3: 512    # Segmentation head

    learning_rate: 0.0001    # Conservative for multi-task

  # Multi-Task Training Configuration
  training:
    max_epochs: 300          # More epochs for complex learning
    batch_size: 32           # Smaller batches for stability
    validation_split: 0.20
    early_stopping: true
    patience: 30             # More patience for convergence

    # Task weighting (PROPOSED)
    task_weights:
      task1: 1.0             # Equal weight to classification
      task2: 0.5             # Lower weight to regression
      task3: 1.5             # Higher weight to segmentation

    # Gradient balancing
    gradient_balancing: true # Balance gradients across tasks

  # Plasticity (shared across tasks)
  plasticity:
    enable_bcm: true
    bcm_tau: 5000.0          # Slower adaptation for stability
    enable_stdp: false
    stdp_window: 20.0

  # Ethics
  ethics:
    enabled: true
    golden_rule_threshold: 0.0
    empathy_weight: 0.8      # High empathy for multi-task

  # Model Persistence
  model_path: "/tmp/models/multitask_brain.brain"
  checkpoint_interval: 20

# ============================================================================
# MULTI-TASK LEARNING STRATEGIES
# ============================================================================

# Strategy 1: Hard Parameter Sharing
# -----------------------------------
# All tasks share the same feature extraction layers
# Only final output heads are task-specific
#
# Architecture:
#   Input (512)
#      ↓
#   Shared Hidden (1024) ← BCM plasticity, shared weights
#      ↓
#   ┌────────────┬────────────┬────────────┐
#   ↓            ↓            ↓            ↓
# Task1 Head  Task2 Head  Task3 Head  ...
#  (256)       (128)       (512)
#   ↓            ↓            ↓
# Output1     Output2     Output3
#  (10)        (1)         (100)

# Strategy 2: Soft Parameter Sharing
# -----------------------------------
# Each task has its own network
# Regularization encourages similar weights
# More flexible but more parameters

# Strategy 3: Cross-Stitch Networks
# ----------------------------------
# Multiple networks with learned connections
# Dynamically shares information between tasks

# Strategy 4: Attention-Based Task Routing
# -----------------------------------------
# Attention mechanism decides which features to use for each task

