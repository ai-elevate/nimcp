# NIMCP Brain Configuration Template
# Use Case: Recommendation System (E-commerce, Content, Music)
# Description: Association learning brain for personalized recommendations
# Applications: Product recommendations, content suggestions, playlist generation
# Method: Learn user-item associations and predict preferences

brain:
  # Identity
  name: "recommendation_engine"

  # Brain size: medium for handling diverse user/item spaces
  size: medium  # 10K neurons, ~50MB memory, ~5ms inference

  # Task type: association learning (user ↔ item relationships)
  task: association

  # Network Architecture
  architecture:
    num_inputs: 200          # User features (100) + Item features (100)
                             # User: demographics, history, preferences
                             # Item: category, price, ratings, tags
    num_outputs: 5           # Top-5 recommendation scores
    num_hidden: 400          # Large hidden layer for complex associations
    learning_rate: 0.003     # Moderate learning for stability

  # Training Configuration
  training:
    max_epochs: 150          # Sufficient for convergence
    batch_size: 128          # Large batches for efficiency
    validation_split: 0.15   # Standard validation split
    early_stopping: true     # Prevent overfitting
    patience: 20             # Generous patience for association learning

  # Synaptic Plasticity
  plasticity:
    enable_bcm: true         # Adapt to changing user preferences
    bcm_tau: 3000.0          # Slow adaptation (preferences change slowly)
    enable_stdp: false       # Not needed for static associations
    stdp_window: 20.0        # Unused

  # Ethics Configuration
  ethics:
    enabled: true            # IMPORTANT: Prevent harmful recommendations
    golden_rule_threshold: 0.0  # Block recommendations that harm users
    empathy_weight: 0.7      # High empathy for user well-being

  # Model Persistence
  model_path: "/tmp/models/recommendation_engine.brain"
  checkpoint_interval: 15   # Regular checkpoints

# Feature Engineering:
# --------------------
# User Features (0-99):
#   [0-9]   One-hot encoded age group
#   [10-19] One-hot encoded location
#   [20-29] Purchase history embedding (avg of past items)
#   [30-39] Category preferences (normalized frequencies)
#   [40-49] Price sensitivity, brand loyalty, etc.
#   [50-74] Collaborative features (similar users)
#   [75-99] Temporal features (time of day, season, etc.)
#
# Item Features (100-199):
#   [100-109] Category one-hot encoding
#   [110-119] Price tier
#   [120-139] Tag/attribute embedding
#   [140-159] Popularity metrics
#   [160-179] Quality indicators (ratings, reviews)
#   [180-199] Collaborative features (similar items)

