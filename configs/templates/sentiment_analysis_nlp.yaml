# Output Labels:
# --------------
# Standard 3-class:
#   - "positive": Favorable opinion (ratings 4-5)
#   - "negative": Unfavorable opinion (ratings 1-2)
#   - "neutral": Mixed or unclear sentiment (rating 3)
#
# Extended 5-class (change num_outputs to 5):
#   - "very_positive": Extremely favorable
#   - "positive": Favorable
#   - "neutral": Neither positive nor negative
#   - "negative": Unfavorable
#   - "very_negative": Extremely unfavorable
#
# Emotion detection (change num_outputs to 7+):
#   - "joy", "sadness", "anger", "fear", "surprise", "disgust", "neutral"

# Ethics in Sentiment Analysis:
# ------------------------------
# 1. Bias detection:
#    - Test for demographic bias (gender, race, age)
#    - Avoid associating neutral terms with negative sentiment
#    - Example: "She is assertive" should not be negative
#
# 2. Context awareness:
#    - "This movie killed it" (positive) vs "The ending killed the movie" (negative)
#    - Sarcasm detection: "Great, another bug" (actually negative)
#    - Domain-specific language: Medical, legal, technical
#
# 3. Privacy:
#    - Don't train on sensitive personal communications
#    - Anonymize user data in training sets
#    - Clear consent for analysis
#
# 4. Fairness:
#    - Balanced training data across demographics
#    - Test on diverse populations
#    - Avoid amplifying harmful stereotypes

# Performance Benchmarks:
# -----------------------
# Expected Accuracy:
#   - Movie reviews (IMDB): 85-90%
#   - Product reviews (Amazon): 80-85%
#   - Twitter (short text): 75-80%
#   - News articles: 85-90%
#
# Inference Speed:
#   - With pre-computed embeddings: <1ms per text
#   - With online embedding: 5-50ms (depends on text length)
#
# Memory:
#   - Brain: ~10MB
#   - Embedding model: 100MB-1GB (depending on vocabulary)

# Common Challenges:
# ------------------
# 1. Sarcasm and irony: Difficult to detect
#    - Solution: Add sarcasm-labeled examples, use contextual embeddings
#
# 2. Short text: Limited context
#    - Solution: Use character n-grams, emoji features
#
# 3. Domain shift: Model trained on reviews fails on tweets
#    - Solution: Fine-tune on target domain, use domain adaptation
#
# 4. Negation: "not good" vs "good"
#    - Solution: Negation-aware preprocessing, contextual embeddings
#
# 5. Multi-lingual: Different languages
#    - Solution: Use multilingual embeddings (mBERT, XLM-R)

# Production Deployment:
# ----------------------
# 1. API endpoint: REST API for real-time sentiment analysis
# 2. Batch processing: Analyze thousands of texts offline
# 3. Streaming: Real-time social media monitoring
# 4. Mobile: Deploy tiny brain on iOS/Android apps
# 5. Caching: Cache embeddings for common phrases

# Integration Examples:
# ---------------------
# - Customer support: Auto-route negative reviews to support team
# - Social media: Monitor brand sentiment in real-time
# - Content moderation: Flag toxic or harmful content
# - Market research: Analyze customer feedback at scale
# - Chatbots: Detect user frustration, adjust tone
# - Email classification: Prioritize urgent/important emails

# Hyperparameter Tuning:
# ----------------------
# For short text (tweets, comments):
#   - num_hidden: 100-150
#   - learning_rate: 0.02
#   - batch_size: 32
#
# For long text (articles, reviews):
#   - num_hidden: 200-300
#   - learning_rate: 0.005
#   - batch_size: 64
#
# For multi-lingual:
#   - num_hidden: 300-400
#   - Use multilingual embeddings
#   - Larger training dataset
