# NIMCP Brain Configuration Template
# Use Case: Sentiment Analysis / Text Classification (NLP)
# Description: Classification brain for analyzing text sentiment and emotions
# Applications: Customer reviews, social media monitoring, chatbot responses
# Classes: Positive, Negative, Neutral (can extend to multiple emotions)

brain:
  # Identity
  name: "sentiment_analyzer"

  # Brain size: small for fast text processing
  size: small  # 1K neurons, ~10MB memory, ~0.5ms inference

  # Task type: multi-class classification (sentiment categories)
  task: classification

  # Network Architecture
  architecture:
    num_inputs: 300          # Text embedding dimension (e.g., GloVe, Word2Vec, BERT)
                             # Alternative: Bag-of-words (vocab size)
    num_outputs: 3           # 3 sentiment classes: positive, negative, neutral
                             # Can extend to 7+ for emotions: joy, anger, sadness, fear, etc.
    num_hidden: 200          # Hidden layer for learning text patterns
    learning_rate: 0.01      # Higher learning rate for text data

  # Training Configuration
  training:
    max_epochs: 80           # Moderate epochs for text classification
    batch_size: 64           # Standard batch size for NLP
    validation_split: 0.20   # 20% validation (important for generalization)
    early_stopping: true     # Prevent overfitting to training vocabulary
    patience: 12             # Patience for noisy text data

  # Synaptic Plasticity
  plasticity:
    enable_bcm: true         # Adaptive thresholds for language patterns
    bcm_tau: 1000.0          # Standard adaptation rate
    enable_stdp: false       # Not needed for static text embeddings
    stdp_window: 20.0        # Unused (use STDP=true for sequential text processing)

  # Ethics Configuration
  ethics:
    enabled: true            # CRITICAL: Prevent biased sentiment analysis
    golden_rule_threshold: 0.0  # Avoid amplifying harmful content
    empathy_weight: 0.6      # Consider context and user impact

  # Model Persistence
  model_path: "/tmp/models/sentiment_analyzer.brain"
  checkpoint_interval: 10   # Save every 10 epochs

# Text Preprocessing Pipeline:
# -----------------------------
# 1. Tokenization: Split text into words/subwords
# 2. Lowercasing: Convert to lowercase for consistency
# 3. Remove stopwords: Optional (depends on embedding method)
# 4. Lemmatization: Reduce words to base form
# 5. Handle negation: "not good" ≠ "good"
# 6. Emoji handling: Convert to text or use emoji embeddings
# 7. Embedding: Convert to 300-dim vector using:
#    - Pre-trained: GloVe, Word2Vec, FastText
#    - Contextual: BERT, RoBERTa (sentence embeddings)
#    - Custom: Train embedding layer

# Input Representation Options:
# ------------------------------
# Option 1: Sentence Embeddings (Recommended)
#   - Use BERT/RoBERTa to get 300-768 dim sentence vector
#   - Handles context and semantic meaning
#   - Best for accuracy
#
# Option 2: Average Word Embeddings
#   - Average all word vectors in sentence
#   - Fast, works well for many cases
#   - num_inputs = embedding_dim (e.g., 300 for GloVe)
#
# Option 3: Bag-of-Words (BoW)
#   - Binary or TF-IDF weighted word presence
#   - num_inputs = vocabulary_size (e.g., 5000-10000)
#   - Simple but less powerful

# Training Data Format:
# ---------------------
# Dataset structure:
#   Text                                    | Label      | Confidence
#   ----------------------------------------|------------|------------
#   "This product is amazing!"              | positive   | 1.0
#   "Terrible service, very disappointed"   | negative   | 1.0
#   "It's okay, nothing special"            | neutral    | 0.8
#   "Love it! 😍"                           | positive   | 1.0
#
# Popular datasets:
#   - IMDB Movie Reviews (50K reviews)
#   - Twitter Sentiment140 (1.6M tweets)
#   - Amazon Product Reviews (millions)
#   - Yelp Reviews (6M reviews)

