[package]
name = "nimcp-adaptive"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "NIMCP V2 — adaptive (MLP) network, Phase 1"

[lints]
workspace = true

[features]
# CPU-only by default. Enable `cuda` to compile the GPU fast-path via
# `nimcp-gpu`. The existing CPU API is unchanged either way — `cuda`
# only adds new methods (`init_gpu`, `forward_gpu`, `learn_gpu`,
# `sync_gpu_to_cpu`) and a new error variant.
default = []
cuda = ["dep:nimcp-gpu"]

[dependencies]
nimcp-core = { workspace = true }
ndarray = { workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }
rkyv = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# Optional GPU backend; pulled in only under `--features cuda`.
nimcp-gpu = { workspace = true, optional = true }
