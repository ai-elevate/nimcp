[package]
name = "nimcp-lnn"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "NIMCP V2 — liquid time-constant neural network, Phase 4"

[lints]
workspace = true

[features]
# Default is CPU-only; `cuda` compiles the LTC GPU kernels (Phase 9f).
default = []
cuda = ["dep:nimcp-gpu", "dep:cudarc"]

[dependencies]
nimcp-core = { workspace = true }
nimcp-substrate = { workspace = true }
nimcp-thalamic = { workspace = true }
ndarray = { workspace = true }
rand = { workspace = true }
rand_chacha = { workspace = true }
serde = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }

# Optional GPU backend (Phase 9f). cudarc + shared GpuError type.
nimcp-gpu = { workspace = true, optional = true }
cudarc = { workspace = true, optional = true }

[dev-dependencies]
approx = "0.5"
serde_json = { workspace = true }
