<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIMCP Simple Demo - Clean UI</title>
    <style>
        /* Clean, Simple Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #eee;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result-box {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 500;
            color: #555;
        }

        .result-value {
            color: #667eea;
            font-weight: 600;
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .metric-card {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .metric-label {
            font-size: 14px;
            color: #666;
        }

        .indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .indicator.good {
            background: #28a745;
        }

        .indicator.warning {
            background: #ffc107;
        }

        .indicator.bad {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🧠 NIMCP Simple Demo</h1>
            <p>Clean, Simple, Easy to Understand - Phase 9 Features</p>
        </div>

        <!-- Main Grid -->
        <div class="grid">
            <!-- Initialize Card -->
            <div class="card">
                <h2>1. Initialize Brain</h2>
                <div class="form-group">
                    <label>Input Dimension:</label>
                    <input type="number" id="input-dim" value="8" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Number of Classes:</label>
                    <input type="number" id="num-classes" value="3" min="2" max="10">
                </div>
                <button onclick="initBrain()">Initialize Brain</button>
                <div id="init-status"></div>
            </div>

            <!-- Train Card -->
            <div class="card">
                <h2>2. Train</h2>
                <div class="form-group">
                    <label>Features (comma-separated):</label>
                    <input type="text" id="train-features" value="1,0,1,0,1,0,1,0" placeholder="e.g., 1,0,1,0,1,0,1,0">
                </div>
                <div class="form-group">
                    <label>Label:</label>
                    <input type="text" id="train-label" value="pattern_A" placeholder="e.g., pattern_A">
                </div>
                <button onclick="train()" id="train-btn" disabled>Train</button>
                <div id="train-status"></div>
            </div>

            <!-- Predict Card -->
            <div class="card">
                <h2>3. Predict</h2>
                <div class="form-group">
                    <label>Features (comma-separated):</label>
                    <input type="text" id="predict-features" value="1,0,1,0,1,0,1,0" placeholder="e.g., 1,0,1,0,1,0,1,0">
                </div>
                <button onclick="predict()" id="predict-btn" disabled>Predict</button>
                <div id="predict-result"></div>
            </div>

            <!-- Metrics Card -->
            <div class="card">
                <h2>4. Metrics</h2>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="metric-predictions">0</div>
                        <div class="metric-label">Predictions</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="metric-training">0</div>
                        <div class="metric-label">Training</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="metric-confidence">0%</div>
                        <div class="metric-label">Avg Confidence</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="metric-quality">0%</div>
                        <div class="metric-label">Avg Quality</div>
                    </div>
                </div>
                <button onclick="refreshMetrics()" style="margin-top: 15px;">Refresh Metrics</button>
                <button onclick="reset()" style="margin-top: 10px; background: #dc3545;">Reset Brain</button>
            </div>
        </div>
    </div>

    <script>
        // Simple, Clean JavaScript
        const API_URL = 'http://localhost:5500/api';
        let brainInitialized = false;

        // Helper: Show status message
        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            el.className = `status ${type}`;
            el.textContent = message;
            setTimeout(() => el.textContent = '', 5000);
        }

        // Helper: Parse feature string
        function parseFeatures(str) {
            return str.split(',').map(x => parseFloat(x.trim())).filter(x => !isNaN(x));
        }

        // 1. Initialize Brain
        async function initBrain() {
            const inputDim = parseInt(document.getElementById('input-dim').value);
            const numClasses = parseInt(document.getElementById('num-classes').value);

            try {
                const response = await fetch(`${API_URL}/init`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({input_dim: inputDim, num_classes: numClasses})
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('init-status', `✓ Brain initialized: ${data.neurons} neurons`, 'success');
                    brainInitialized = true;
                    document.getElementById('train-btn').disabled = false;
                    document.getElementById('predict-btn').disabled = false;
                } else {
                    showStatus('init-status', `✗ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('init-status', `✗ Connection error: ${error.message}`, 'error');
            }
        }

        // 2. Train
        async function train() {
            const features = parseFeatures(document.getElementById('train-features').value);
            const label = document.getElementById('train-label').value.trim();

            if (features.length === 0 || !label) {
                showStatus('train-status', '✗ Please provide features and label', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/train`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({features, label, confidence: 0.9})
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('train-status', `✓ ${data.message}`, 'success');
                    refreshMetrics();
                } else {
                    showStatus('train-status', `✗ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('train-status', `✗ Error: ${error.message}`, 'error');
            }
        }

        // 3. Predict
        async function predict() {
            const features = parseFeatures(document.getElementById('predict-features').value);

            if (features.length === 0) {
                showStatus('predict-result', '✗ Please provide features', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({features})
                });

                const data = await response.json();

                if (data.success) {
                    const html = `
                        <div class="result-box">
                            <div class="result-item">
                                <span class="result-label">Prediction:</span>
                                <span class="result-value">${data.prediction}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Confidence:</span>
                                <span class="result-value">${(data.confidence * 100).toFixed(1)}%</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Epistemic Quality:</span>
                                <span class="result-value">
                                    <span class="indicator ${data.epistemic_quality > 0.7 ? 'good' : data.epistemic_quality > 0.4 ? 'warning' : 'bad'}"></span>
                                    ${(data.epistemic_quality * 100).toFixed(1)}%
                                </span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Requires Verification:</span>
                                <span class="result-value">${data.requires_verification ? '⚠ Yes' : '✓ No'}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Bias Detected:</span>
                                <span class="result-value">${data.bias_detected ? '⚠ Yes' : '✓ No'}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Ethical Approval:</span>
                                <span class="result-value">${data.ethical_approved ? '✓ Yes' : '✗ No'}</span>
                            </div>
                        </div>
                    `;
                    document.getElementById('predict-result').innerHTML = html;
                    refreshMetrics();
                } else {
                    showStatus('predict-result', `✗ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('predict-result', `✗ Error: ${error.message}`, 'error');
            }
        }

        // 4. Refresh Metrics
        async function refreshMetrics() {
            try {
                const response = await fetch(`${API_URL}/metrics`);
                const data = await response.json();

                if (data.success) {
                    const m = data.metrics;
                    document.getElementById('metric-predictions').textContent = m.total_predictions;
                    document.getElementById('metric-training').textContent = m.total_training;
                    document.getElementById('metric-confidence').textContent =
                        (m.avg_confidence * 100).toFixed(0) + '%';
                    document.getElementById('metric-quality').textContent =
                        (m.avg_epistemic_quality * 100).toFixed(0) + '%';
                }
            } catch (error) {
                console.error('Error refreshing metrics:', error);
            }
        }

        // 5. Reset
        async function reset() {
            if (!confirm('Are you sure you want to reset the brain?')) return;

            try {
                const response = await fetch(`${API_URL}/reset`, {method: 'POST'});
                const data = await response.json();

                if (data.success) {
                    brainInitialized = false;
                    document.getElementById('train-btn').disabled = true;
                    document.getElementById('predict-btn').disabled = true;
                    showStatus('init-status', '✓ Brain reset', 'success');
                    refreshMetrics();
                }
            } catch (error) {
                console.error('Error resetting:', error);
            }
        }

        // Auto-refresh metrics every 5 seconds
        setInterval(refreshMetrics, 5000);
    </script>
</body>
</html>
