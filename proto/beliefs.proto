/**
 * @file beliefs.proto
 * @brief Protobuf schemas for distributed belief propagation
 *
 * WHAT: Messages for gossip-based belief sharing and consensus
 * WHY: Enable emergent collective knowledge without central authority
 * HOW: Probabilistic gossip, credibility weighting, contradiction detection
 *
 * BIOLOGICAL BASIS:
 * - Belief updating mimics Bayesian inference
 * - Credibility weighting parallels source monitoring in prefrontal cortex
 * - Consensus mechanisms inspired by quorum sensing in bacteria
 */

syntax = "proto3";
package nimcp.collective;

option optimize_for = LITE_RUNTIME;

/**
 * Belief gossip message - probabilistic belief propagation
 */
message BeliefGossip {
    uint32 source_brain_id = 1;
    string belief_key = 2;
    bytes belief_value = 3;          // Serialized belief content
    float confidence = 4;            // [0-1]
    uint64 timestamp_us = 5;
    uint32 hop_count = 6;            // TTL, decremented each hop
    float source_credibility = 7;    // Credibility of original source [0-1]

    // For contradiction detection
    bytes belief_hash = 8;           // Hash for quick comparison
    uint32 version = 9;              // Lamport timestamp for ordering
}

/**
 * Detected contradiction between beliefs
 */
message BeliefContradiction {
    string belief_key = 1;
    uint32 brain_a = 2;
    uint32 brain_b = 3;
    bytes value_a = 4;
    bytes value_b = 5;
    float confidence_a = 6;
    float confidence_b = 7;
    uint64 detected_at_us = 8;

    ResolutionStrategy resolution = 9;

    enum ResolutionStrategy {
        UNRESOLVED = 0;
        HIGHER_CONFIDENCE = 1;
        MORE_RECENT = 2;
        CONSENSUS_VOTE = 3;
        DEFERRED = 4;
        MERGED = 5;              // Beliefs merged into new value
    }
}

/**
 * Request for consensus on a belief
 */
message ConsensusRequest {
    uint32 request_id = 1;
    string belief_key = 2;
    uint32 proposer_brain_id = 3;
    bytes proposed_value = 4;
    float timeout_ms = 5;
    uint32 min_votes = 6;            // Minimum votes required
    float quorum_threshold = 7;      // Fraction needed for consensus [0-1]
}

/**
 * Vote on a consensus request
 */
message ConsensusVote {
    uint32 request_id = 1;
    string belief_key = 2;
    uint32 voter_brain_id = 3;
    bool agrees = 4;
    float confidence = 5;            // [0-1]
    bytes alternative_value = 6;     // If disagrees, proposed alternative
    string rationale = 7;            // Optional explanation
}

/**
 * Result of a consensus request
 */
message ConsensusResult {
    uint32 request_id = 1;
    string belief_key = 2;
    ConsensusOutcome outcome = 3;
    bytes final_value = 4;
    float agreement_level = 5;       // [0-1]
    uint32 votes_for = 6;
    uint32 votes_against = 7;
    uint32 votes_abstain = 8;

    enum ConsensusOutcome {
        PENDING = 0;
        ACCEPTED = 1;
        REJECTED = 2;
        TIMED_OUT = 3;
        NO_QUORUM = 4;
    }
}

/**
 * Knowledge query - ask the collective for information
 */
message KnowledgeQuery {
    uint32 query_id = 1;
    uint32 requester_brain_id = 2;
    string query_key = 3;
    QueryType type = 4;
    uint32 timeout_ms = 5;
    uint32 max_responses = 6;        // Max responses to collect

    enum QueryType {
        EXACT = 0;               // Exact key match
        PREFIX = 1;              // Keys starting with query_key
        FUZZY = 2;               // Semantic similarity search
    }
}

/**
 * Response to knowledge query
 */
message KnowledgeResponse {
    uint32 query_id = 1;
    uint32 responder_brain_id = 2;
    string belief_key = 3;
    bytes belief_value = 4;
    float confidence = 5;
    uint64 last_updated_us = 6;
    float relevance = 7;             // How relevant to query [0-1]
}

/**
 * Credibility update for a brain
 */
message CredibilityUpdate {
    uint32 subject_brain_id = 1;
    uint32 evaluator_brain_id = 2;
    float new_credibility = 3;       // [0-1]
    CredibilityReason reason = 4;

    enum CredibilityReason {
        INITIAL = 0;
        ACCURATE_PREDICTION = 1;
        INACCURATE_PREDICTION = 2;
        CONSISTENT_BEHAVIOR = 3;
        INCONSISTENT_BEHAVIOR = 4;
        PEER_ENDORSEMENT = 5;
        PEER_WARNING = 6;
    }
}
