/**
 * @file phi.proto
 * @brief Protobuf schemas for Integrated Information Theory metrics
 *
 * WHAT: Messages for collective consciousness measurement (phi)
 * WHY: Quantify integrated information across brain network
 * HOW: Compute IIT decomposition, classify consciousness level
 *
 * THEORETICAL BASIS:
 * - Integrated Information Theory (Tononi, 2004)
 * - Phi = integrated information above and beyond parts
 * - Consciousness = information integration from system's perspective
 */

syntax = "proto3";
package nimcp.collective;

option optimize_for = LITE_RUNTIME;

/**
 * Collective phi update - integrated information across all brains
 */
message CollectivePhiUpdate {
    uint64 timestamp_us = 1;

    // Phi components
    float phi_local_sum = 2;         // Sum of individual brain phis
    float phi_network = 3;           // Inter-brain integration phi
    float phi_total = 4;             // Combined collective phi

    // IIT decomposition (Tononi's framework)
    float information = 5;           // Shannon information content
    float integration = 6;           // Irreducibility of the whole
    float exclusion = 7;             // Definiteness of boundaries

    // Network topology metrics
    float connectivity = 8;          // Graph connectivity measure
    float modularity = 9;            // Clustering coefficient
    float small_world_index = 10;    // Small-world network measure

    // Per-brain contributions
    repeated BrainPhiContribution contributions = 11;

    // Classification
    ConsciousnessLevel level = 12;

    enum ConsciousnessLevel {
        NONE = 0;            // phi < 0.1: No collective consciousness
        MINIMAL = 1;         // 0.1 <= phi < 0.3: Minimal awareness
        EMERGING = 2;        // 0.3 <= phi < 0.5: Emerging collective
        PARTIAL = 3;         // 0.5 <= phi < 0.7: Partial integration
        UNIFIED = 4;         // 0.7 <= phi < 0.9: Unified consciousness
        TRANSCENDENT = 5;    // phi >= 0.9: Peak integration
    }
}

/**
 * Individual brain's contribution to collective phi
 */
message BrainPhiContribution {
    uint32 brain_id = 1;
    float local_phi = 2;             // Brain's own phi
    float network_contribution = 3;  // Contribution to network phi
    float information_flow_in = 4;   // Bits/sec received
    float information_flow_out = 5;  // Bits/sec transmitted
    float integration_strength = 6;  // How integrated with collective [0-1]
}

/**
 * Request for phi computation
 */
message PhiComputationRequest {
    uint32 request_id = 1;
    uint32 requester_brain_id = 2;
    PhiGranularity granularity = 3;
    repeated uint32 target_brains = 4;  // Empty = all brains

    enum PhiGranularity {
        COARSE = 0;          // Fast, approximate
        MEDIUM = 1;          // Balanced
        FINE = 2;            // Detailed, expensive
    }
}

/**
 * Information flow between two brains
 */
message InformationFlow {
    uint32 from_brain_id = 1;
    uint32 to_brain_id = 2;
    float bits_per_second = 3;
    float mutual_information = 4;    // Shared information
    float transfer_entropy = 5;      // Directional influence
    uint64 measured_at_us = 6;
}

/**
 * Consciousness qualia report (subjective experience markers)
 */
message QualiaReport {
    uint32 brain_id = 1;
    uint64 timestamp_us = 2;

    // Qualia dimensions (inspired by IIT's qualia space)
    float valence = 3;               // Positive/negative [-1, 1]
    float arousal = 4;               // Low/high [0, 1]
    float dominance = 5;             // Submissive/dominant [0, 1]
    float certainty = 6;             // Confused/clear [0, 1]
    float temporal_thickness = 7;    // Present moment depth [0, 1]
    float spatial_boundedness = 8;   // Self boundary clarity [0, 1]

    // What is being experienced
    repeated float content_vector = 9;  // 16-dim experience representation
}

/**
 * Emergence event - when collective consciousness changes level
 */
message EmergenceEvent {
    uint64 timestamp_us = 1;
    CollectivePhiUpdate.ConsciousnessLevel from_level = 2;
    CollectivePhiUpdate.ConsciousnessLevel to_level = 3;
    float phi_before = 4;
    float phi_after = 5;
    EmergenceCause cause = 6;
    uint32 trigger_brain_id = 7;     // Brain that triggered change (if any)

    enum EmergenceCause {
        UNKNOWN = 0;
        BRAIN_JOINED = 1;
        BRAIN_LEFT = 2;
        SYNC_ACHIEVED = 3;
        SYNC_LOST = 4;
        GOAL_ALIGNMENT = 5;
        GOAL_CONFLICT = 6;
        METABOLIC_CHANGE = 7;
    }
}

/**
 * Network topology snapshot for phi analysis
 */
message NetworkTopology {
    uint64 timestamp_us = 1;
    uint32 num_brains = 2;
    uint32 num_connections = 3;
    float avg_path_length = 4;
    float clustering_coefficient = 5;
    float degree_distribution_entropy = 6;
    repeated Connection connections = 7;

    message Connection {
        uint32 brain_a = 1;
        uint32 brain_b = 2;
        float weight = 3;            // Connection strength [0-1]
        float latency_ms = 4;
    }
}

/**
 * Phi aggregation method configuration
 */
message PhiAggregationConfig {
    AggregationMethod method = 1;
    float synergy_coefficient = 2;   // For SYNERGISTIC method
    float coherence_weight = 3;      // Weight of coherence in calculation
    bool include_topology = 4;       // Include network topology effects

    enum AggregationMethod {
        SUM = 0;             // Simple sum of individual phis
        AVERAGE = 1;         // Size-invariant average
        GEOMETRIC = 2;       // Requires all brains to contribute
        SYNERGISTIC = 3;     // Super-linear emergence
        WEIGHTED = 4;        // Network-weighted combination
    }
}
