name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to push the sync back to your fork

    steps:
      - name: Sync fork with upstream
        run: gh repo sync ${{ github.repository }} --source redmage123/nimcp --branch master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
